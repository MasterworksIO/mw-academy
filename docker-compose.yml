version: '3.8'

services:
  wordpress:
    image: wordpress:latest
    ports:
      - "8080:80"
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress
      WORDPRESS_DB_NAME: academy_wp
      WORDPRESS_CONFIG_EXTRA: |
        define('WP_HOME', 'http://localhost:8080');
        define('WP_SITEURL', 'http://localhost:8080');
        define('WP_DEBUG', true);
        define('WP_DEBUG_LOG', true);
        define('WP_DEBUG_DISPLAY', true);
    volumes:
      # Mount your custom theme
      - ./wordpress-theme/masterworks-academy:/var/www/html/wp-content/themes/masterworks-academy
      # Mount your custom plugins
      - ./plugins/mw-content-types:/var/www/html/wp-content/plugins/mw-content-types
      - ./plugins/mw-data-visualizations:/var/www/html/wp-content/plugins/mw-data-visualizations
      - ./plugins/mw-contentful-integration:/var/www/html/wp-content/plugins/mw-contentful-integration
      - ./plugins/mw-seo-schema:/var/www/html/wp-content/plugins/mw-seo-schema
      # Persist uploads and other WP data
      - wp_data:/var/www/html
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: academy_wp
      MYSQL_USER: wordpress
      MYSQL_PASSWORD: wordpress
      MYSQL_ROOT_PASSWORD: rootpassword
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # phpMyAdmin for easy database inspection (optional)
  phpmyadmin:
    image: phpmyadmin:latest
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: rootpassword
    depends_on:
      - db
    restart: unless-stopped

volumes:
  wp_data:
  db_data:
