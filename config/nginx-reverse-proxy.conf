# =============================================================================
# Masterworks Academy - Nginx Reverse Proxy Configuration
#
# ALTERNATIVE to the CloudFront approach. Use this when the React app sits
# behind Nginx on an EC2 instance (or any server where you control Nginx).
#
# This server block proxies /academy/* to the Lightsail WordPress instance
# and serves everything else from the React app.
#
# Replace these placeholders before deploying:
#   {{LIGHTSAIL_IP}}   - Static IP of the Lightsail instance
#   {{SSL_CERT_PATH}}  - Path to SSL certificate (e.g., fullchain.pem)
#   {{SSL_KEY_PATH}}   - Path to SSL private key (e.g., privkey.pem)
# =============================================================================

# -----------------------------------------------------------------------------
# Upstream: WordPress on Lightsail
# -----------------------------------------------------------------------------
upstream academy_wordpress {
    server {{LIGHTSAIL_IP}}:80;
    keepalive 16;
}

# -----------------------------------------------------------------------------
# HTTP -> HTTPS redirect
# -----------------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name masterworks.com www.masterworks.com;

    # Allow ACME challenges for certificate renewal
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://masterworks.com$request_uri;
    }
}

# -----------------------------------------------------------------------------
# www -> non-www redirect
# -----------------------------------------------------------------------------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.masterworks.com;

    ssl_certificate     {{SSL_CERT_PATH}};
    ssl_certificate_key {{SSL_KEY_PATH}};

    return 301 https://masterworks.com$request_uri;
}

# -----------------------------------------------------------------------------
# Main HTTPS server block
# -----------------------------------------------------------------------------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name masterworks.com;

    # -------------------------------------------------------------------------
    # SSL / TLS
    # -------------------------------------------------------------------------
    ssl_certificate     {{SSL_CERT_PATH}};
    ssl_certificate_key {{SSL_KEY_PATH}};

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # -------------------------------------------------------------------------
    # Security Headers (global)
    # -------------------------------------------------------------------------
    add_header X-Frame-Options          "SAMEORIGIN"                          always;
    add_header X-Content-Type-Options   "nosniff"                             always;
    add_header X-XSS-Protection         "1; mode=block"                       always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"     always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # -------------------------------------------------------------------------
    # Gzip Compression
    # -------------------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        text/xml
        application/json
        application/javascript
        application/x-javascript
        application/xml
        application/xml+rss
        application/vnd.ms-fontobject
        font/opentype
        image/svg+xml;

    # -------------------------------------------------------------------------
    # Academy: /academy/wp-admin/ - WordPress admin (NO caching)
    # -------------------------------------------------------------------------
    location /academy/wp-admin/ {
        proxy_pass http://academy_wordpress/academy/wp-admin/;

        proxy_set_header Host              masterworks.com;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  masterworks.com;

        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # Generous timeouts for slow admin operations (imports, plugin installs)
        proxy_connect_timeout 60s;
        proxy_send_timeout    120s;
        proxy_read_timeout    120s;

        proxy_buffering on;
        proxy_buffer_size 16k;
        proxy_buffers 8 32k;
        client_max_body_size 64M;

        # Prevent caching
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header Pragma        "no-cache" always;
    }

    # -------------------------------------------------------------------------
    # Academy: /academy/wp-login.php (NO caching)
    # -------------------------------------------------------------------------
    location = /academy/wp-login.php {
        proxy_pass http://academy_wordpress/academy/wp-login.php;

        proxy_set_header Host              masterworks.com;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  masterworks.com;

        proxy_http_version 1.1;
        proxy_set_header Connection "";

        client_max_body_size 64M;

        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
    }

    # -------------------------------------------------------------------------
    # Academy: /academy/wp-content/uploads/ - Media (aggressive caching)
    # -------------------------------------------------------------------------
    location /academy/wp-content/uploads/ {
        proxy_pass http://academy_wordpress/academy/wp-content/uploads/;

        proxy_set_header Host              masterworks.com;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # 30-day cache for uploaded media
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        access_log off;
    }

    # -------------------------------------------------------------------------
    # Academy: /academy/wp-content/ - Theme and plugin assets (cache)
    # -------------------------------------------------------------------------
    location /academy/wp-content/ {
        proxy_pass http://academy_wordpress/academy/wp-content/;

        proxy_set_header Host              masterworks.com;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # 7-day cache for theme/plugin assets
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        access_log off;
    }

    # -------------------------------------------------------------------------
    # Academy: /academy/wp-json/ - REST API
    # -------------------------------------------------------------------------
    location /academy/wp-json/ {
        proxy_pass http://academy_wordpress/academy/wp-json/;

        proxy_set_header Host              masterworks.com;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  masterworks.com;

        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_connect_timeout 30s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        # Short cache for API responses
        add_header Cache-Control "public, max-age=60, s-maxage=300";
    }

    # -------------------------------------------------------------------------
    # Academy: /academy/xmlrpc.php - BLOCK entirely
    # -------------------------------------------------------------------------
    location = /academy/xmlrpc.php {
        deny all;
        return 403;
    }

    # -------------------------------------------------------------------------
    # Academy: /academy (no trailing slash) - redirect to canonical form
    # -------------------------------------------------------------------------
    location = /academy {
        return 301 https://masterworks.com/academy/;
    }

    # -------------------------------------------------------------------------
    # Academy: /academy/ - Catch-all for all other WordPress routes
    # -------------------------------------------------------------------------
    location /academy/ {
        proxy_pass http://academy_wordpress/academy/;

        proxy_set_header Host              masterworks.com;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  masterworks.com;

        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_connect_timeout 30s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        proxy_buffering on;
        proxy_buffer_size 16k;
        proxy_buffers 4 32k;
        client_max_body_size 64M;
    }

    # -------------------------------------------------------------------------
    # Default: React application
    # -------------------------------------------------------------------------
    # Adjust to match your React setup:
    #   - Static build: root + try_files (shown below)
    #   - Node.js server: proxy_pass http://localhost:3000;
    location / {
        root /var/www/react-app/build;
        try_files $uri /index.html;

        # Cache fingerprinted React assets for 1 year
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }
    }

    # -------------------------------------------------------------------------
    # Logging
    # -------------------------------------------------------------------------
    access_log /var/log/nginx/masterworks-access.log;
    error_log  /var/log/nginx/masterworks-error.log warn;
}
